# model_map.conf -- Agent Model Routing
# Format: agent_name=model
# Valid models: opus, sonnet, haiku, ollama
# Default (unlisted agents): sonnet
#
# Tier Guide:
#   opus    -- Strategy, voice, complex reasoning, judgment calls ($$$)
#   sonnet  -- Code gen, structured tasks, following instructions ($$)
#   haiku   -- Classification, summarization, simple extraction ($)
#   ollama  -- Bulk processing, health checks, free local models (FREE)
#
# The Admiral's Rule: when in doubt, send the stronger model.
# A misrouted task to Haiku that fails costs more than routing to Sonnet the first time.

# === EXAMPLE ASSIGNMENTS ===
# Uncomment and customize for your agents:

# Heavy reasoning (Admiral tier)
# dreamer=opus

# Moderate reasoning (Captain tier)
# morning_briefing=sonnet
# evening_briefing=sonnet
# merchant=sonnet

# Light work (Bosun tier)
# intake_sweep=haiku
# status_report=haiku

# Free tier (Deckhand -- requires Ollama running locally)
# sync_warden=ollama
